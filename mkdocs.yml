docs_dir: docs
site_dir: site
site_name: Loom Framework
site_description: A metadata-driven application framework in Rust
site_url: https://shridarpatil.github.io/loom/
repo_url: https://github.com/shridarpatil/loom
repo_name: shridarpatil/loom

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - getting-started/index.md
    - Installation: getting-started/installation.md
    - Your First App: getting-started/your-first-app.md
  - Concepts:
    - concepts/index.md
    - DocTypes: concepts/doctypes.md
    - Permissions: concepts/permissions.md
    - Rhai Scripting: concepts/scripting.md
    - Background Queue: concepts/queue.md
    - Realtime: concepts/realtime.md
    - Apps: concepts/apps.md
  - REST API:
    - api/index.md
    - Resource API: api/resource.md
    - Other Endpoints: api/other.md
  - CLI Reference: cli/index.md
  - Guides:
    - guides/index.md
    - Child Tables: guides/child-tables.md
    - Workflows: guides/workflows.md
    - fetch_from & depends_on: guides/fetch-from.md
